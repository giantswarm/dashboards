name: Update mixin dashboards

on:
  schedule:
    # At 09:00 on the 1st of each month
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable

    - name: Install tools
      run: make install-tools

    - name: Add tools to PATH
      run: echo "$(pwd)/tools" >> $GITHUB_PATH

    - name: Update mixins
      run: make update-mixin
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        title: "[AUTO] Update mixin dashboards"
        branch: automated/update-mixin-dashboards
        base: main
        author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
        commit-message: "Update mixin dashboards"
        body: |
          Automated monthly update of Tempo, Mimir, Loki and Alloy mixin dashboards.

          Version pins are derived from the appVersion in the corresponding
          giantswarm/*-app repositories.
