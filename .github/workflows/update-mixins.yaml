name: Update mixin dashboards

on:
  schedule:
    # At 09:00 on the 1st of each month
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: stable

    - name: Install tools
      run: make install-tools

    - name: Add tools to PATH
      run: echo "$(pwd)/tools" >> $GITHUB_PATH

    - name: Update mixins
      run: make update-mixin
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8.1.1
      with:
        title: "[AUTO] Update mixin dashboards"
        branch: automated/update-mixin-dashboards
        base: main
        author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
        commit-message: "Update mixin dashboards"
        body: |
          Automated monthly update of Tempo, Mimir, Loki and Alloy mixin dashboards.

          Version pins are derived from the appVersion in the corresponding
          giantswarm/*-app repositories.
