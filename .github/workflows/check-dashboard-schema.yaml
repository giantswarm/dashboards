name: Check dashboard schema

on:
  pull_request:
    branches:
      - main
    paths:
      - 'helm/dashboards/**/*.json'
      - 'scripts/check-dashboard-schema.sh'

permissions: {}

env:
  # Single source of truth for the failure message, reused by the check
  # annotation (::error::) and the PR comment so the two stay identical.
  SCHEMA_ERROR_MSG: "The dashboard schema is invalid. Try re-exporting your dashboard following this guide: https://github.com/giantswarm/dashboards/blob/main/CONTRIBUTING.md#exporting-dashboards-from-grafana"

jobs:
  # Fails if any dashboard is neither classic "v1" nor "v2"
  # (apiVersion dashboard.grafana.app/v2*). In particular this rejects the
  # unwrapped "JSON model" from a dashboard's Settings -> JSON model view.
  check-dashboard-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      fragment: ${{ steps.check.outputs.fragment }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Check dashboard schema
      id: check
      run: |
        # Capture the script's exit code without aborting (so we can still build
        # the PR-comment fragment), then re-exit with it at the end to fail the job.
        set +e
        ./scripts/check-dashboard-schema.sh | tee check-schema.log
        status=${PIPESTATUS[0]}
        set -e
        problems="$(sed -n '/^BEGIN_DASHBOARD_PROBLEMS$/,/^END_DASHBOARD_PROBLEMS$/p' check-schema.log | sed '1d;$d')"
        if [ -n "$problems" ]; then
          echo "::error::${SCHEMA_ERROR_MSG}"
          # Cap how many problem lines go into the PR comment: keeps it readable and
          # under GitHub's comment size limit. The full list is always in the job log.
          max=50
          total=$(printf '%s\n' "$problems" | wc -l)
          {
            echo "fragment<<DASHBOARD_FRAGMENT_EOF"
            echo "### Schema — \`check-dashboard-schema\`"
            echo
            printf '%s\n' "$problems" | head -n "$max"
            if [ "$total" -gt "$max" ]; then
              echo
              echo "_…and $((total - max)) more line(s) truncated. See the \`check-dashboard-schema\` job log for the full list._"
            fi
            echo "DASHBOARD_FRAGMENT_EOF"
          } >> "$GITHUB_OUTPUT"
        fi
        exit "$status"

  # Surfaces the check result as a single sticky PR comment so the failures are
  # visible in the PR timeline alongside the red check.
  report:
    needs: [check-dashboard-schema]
    # always() disables the implicit success() gate so the comment is still
    # posted (or cleaned up) when the check job fails, not only when it passes.
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      SCHEMA_FRAGMENT: ${{ needs.check-dashboard-schema.outputs.fragment }}
    steps:
    - name: Upsert dashboard-schema-check comment
      run: |
        marker='<!-- dashboard-schema-check -->'
        body=""
        if [ -n "$SCHEMA_FRAGMENT" ]; then
          body+="$marker"$'\n'
          body+='## ❌ Dashboard schema check failed'$'\n\n'
          body+="$SCHEMA_FRAGMENT"$'\n\n'
          body+="$SCHEMA_ERROR_MSG"
        fi

        # Find a previous sticky comment by its hidden marker.
        existing="$(gh api "repos/$REPO/issues/$PR/comments" \
          --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -n1)"

        if [ -n "$body" ]; then
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" -f body="$body" >/dev/null
            echo "Updated dashboard-schema-check comment."
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -f body="$body" >/dev/null
            echo "Created dashboard-schema-check comment."
          fi
        elif [ -n "$existing" ]; then
          gh api -X DELETE "repos/$REPO/issues/comments/$existing" >/dev/null
          echo "Check clean — removed previous dashboard-schema-check comment."
        else
          echo "Check clean — nothing to report."
        fi
